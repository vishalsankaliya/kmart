<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wishlist - K Mart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f3f6;
font-family:Poppins, sans-serif;
}

.header{
background:#2874f0;
color:white;
padding:15px;
font-size:22px;
font-weight:600;
}

.wishlist-container{
max-width:900px;
margin:auto;
margin-top:30px;
}

.product-card{
background:white;
border-radius:8px;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product-info{
display:flex;
align-items:center;
gap:15px;
}

.product-img{
width:80px;
height:80px;
object-fit:contain;
}

.product-name{
font-weight:600;
font-size:16px;
}

.price{
color:#388e3c;
font-weight:bold;
}

.remove{
color:red;
font-size:14px;
text-decoration:none;
}

.remove:hover{
text-decoration:underline;
}

.empty-box{
text-align:center;
background:white;
padding:40px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="header">
❤️ My Wishlist
</div>

<div class="wishlist-container">

{% if wishlist_items %}

{% for item in wishlist_items %}

<div class="product-card">

<div class="product-info">

<img src="{{ item.image }}" class="product-img">

<div>

<div class="product-name">
{{ item.name }}
</div>

<div class="price">
₹{{ item.price }}
</div>

<a href="/remove_wishlist/{{ item.id }}" class="remove">
Remove
</a>

</div>

</div>

<a href="/add_to_cart/{{ item.product_id }}" class="btn btn-primary">
Add to Cart
</a>

</div>

{% endfor %}

{% else %}

<div class="empty-box">

<h4>Your Wishlist is Empty</h4>
<p>Add products you love to your wishlist.</p>

<a href="/" class="btn btn-primary">
Continue Shopping
</a>

</div>

{% endif %}

</div>

</body>
</html>
