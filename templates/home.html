<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home & Furniture - K Mart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2874f0', secondary: '#fb641b', dark: '#212121', light: '#f0f0f0'
                    },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body class="bg-gray-100 font-sans">
    <nav class="sticky top-0 z-50 bg-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <a href="{{ url_for('index')}}" class="flex items-center gap-2 text-2xl font-bold text-primary"><i
                    class="fas fa-shopping-bag"></i><span class="italic">K Mart</span></a>
            <div class="hidden md:flex flex-1 mx-8"><input type="text" placeholder="Search for Furniture"
                    class="w-full py-2 px-4 rounded-l-md border border-gray-300 bg-gray-50"><button
                    class="bg-primary text-white px-6 py-2 rounded-r-md"><i class="fas fa-search"></i></button></div>
            <div class="flex items-center gap-6">
                <a href="{{ url_for('profile')}}" class="flex items-center gap-2 hover:text-primary"><i
                        class="far fa-user text-xl"></i><span class="hidden sm:block font-medium">Profile</span></a>
                <a href="{{ url_for('cart')}}" class="flex items-center gap-2 hover:text-primary relative"><i
                        class="fas fa-shopping-cart text-xl"></i><span
                        class="hidden sm:block font-medium">Cart</span><span
                        class="absolute -top-2 -right-2 bg-secondary text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">2</span></a>
            </div>
        </div>
        <div class="bg-white border-t border-gray-100 hidden md:block">
            <div class="container mx-auto px-4 flex justify-between py-2 text-sm font-medium text-gray-700">
                <a href="{{ url_for('electronics')}}" class="hover:text-primary transition">Electronics</a>
                    <a href="{{ url_for('appliance')}}" class="hover:text-primary transition">TVs & Appliances</a>
                    <a href="{{ url_for('men')}}" class="hover:text-primary transition">Men</a>
                    <a href="{{ url_for('women')}}" class="hover:text-primary transition">Women</a>
                    <a href="{{ url_for('kids')}}" class="hover:text-primary transition">Baby & Kids</a>
                    <a href="{{ url_for('home')}}" class="hover:text-primary transition">Home & Furniture</a>
                    <a href="{{ url_for('sports')}}" class="hover:text-primary transition">Sports, Books & More</a>
            </div>
        </div>
    </nav>
        <div class="container mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">
        <!-- Sidebar -->
        <form method="GET">

            <h4>Category</h4>
            <label><input type="radio" name="category" value="Sofas"> Sofas</label><br>
            <label><input type="radio" name="category" value="Beds"> Beds</label><br>
            <label><input type="radio" name="category" value="Decor"> Decor</label>
            <label><input type="radio" name="category" value="Lighting"> Lighting</label>

            <hr>

            <h4>Price</h4>
            <input type="number" name="min_price" placeholder="Min Price"><br><br>
            <input type="number" name="max_price" placeholder="Max Price">

            <br><br>
            <button type="submit" class="bg-primary text-white px-4 py-2 rounded">
            Apply Filters
            </button>

        </form>

        <!-- Product Grid -->
        <main class="flex-1">
            <h2 class="text-xl font-bold mb-6">Home & Furniture</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

            {% for product in products %}
            <a href="#"
               class="bg-white p-4 rounded-lg shadow-sm hover:shadow-xl transition group">

                <img src="{{ product.image }}" width="150">
                <h3 class="font-medium text-gray-800 truncate">
                    {{ product.name }}
                </h3>

                <div class="text-gray-600 text-sm">
                    {{ product.brand }}
                </div>

                <div class="font-bold text-lg">
                    ₹ {{ product.price }}
                </div>

            </a>
            {% endfor %}

            </div>
        </main>
    </div>
</body>

</html>
