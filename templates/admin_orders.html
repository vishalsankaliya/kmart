<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>
</head>
<body>
    <h2>All Orders</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>User ID</th>
            <th>Product</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Payment</th>
        </tr>

        {% for order in orders %}
        <tr>
            <td>{{ order.id }}</td>
            <td>{{ order.user_id }}</td>
            <td>{{ order.product_name }}</td>
            <td>{{ order.quantity }}</td>
            <td>{{ order.total }}</td>
            <td>{{ order.payment_method }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
