<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - K Mart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2874f0', secondary: '#fb641b', dark: '#212121',
                        'input-bg': '#F3F4F6',
                    },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body class="bg-[#EFF6FF] font-sans h-screen flex items-center justify-center p-4">

    <!-- Mobile-like Container -->
    <div
        class="bg-white w-full max-w-sm rounded-[40px] shadow-2xl overflow-hidden p-8 relative min-h-[700px] flex flex-col border-[8px] border-white ring-1 ring-gray-100">

        <!-- Header -->
        <div class="text-center mb-12 mt-4 relative">
            <a href="signup.html" class="absolute left-0 top-1 text-gray-800 hover:text-primary transition">
                <i class="fas fa-chevron-left text-xl"></i>
            </a>
            <h2 class="text-2xl font-bold text-gray-900 mt-8">Enter Otp</h2>
            <p class="text-gray-500 text-xs mt-3 px-4 leading-relaxed">
                A one-time password (OTP) has been sent to your registered email or phone number.
            </p>
        </div>

        <!-- OTP Inputs -->
        <form class="flex-1 flex flex-col" action="index.html">

            <div class="flex justify-center gap-4 mb-8">
                <input type="text" maxlength="1"
                    class="w-14 h-14 bg-input-bg rounded-2xl text-center text-xl font-bold text-gray-800 focus:outline-primary focus:bg-white border border-transparent focus:border-primary transition"
                    autofocus>
                <input type="text" maxlength="1"
                    class="w-14 h-14 bg-input-bg rounded-2xl text-center text-xl font-bold text-gray-800 focus:outline-primary focus:bg-white border border-transparent focus:border-primary transition">
                <input type="text" maxlength="1"
                    class="w-14 h-14 bg-input-bg rounded-2xl text-center text-xl font-bold text-gray-800 focus:outline-primary focus:bg-white border border-transparent focus:border-primary transition">
                <input type="text" maxlength="1"
                    class="w-14 h-14 bg-input-bg rounded-2xl text-center text-xl font-bold text-gray-800 focus:outline-primary focus:bg-white border border-transparent focus:border-primary transition">
            </div>

            <div class="text-center mb-12">
                <button type="button" class="text-primary text-xs font-bold hover:underline">Resend code in
                    00:30</button>
            </div>

            <button type="submit"
                class="w-full bg-primary text-white font-bold py-3.5 rounded-full shadow-lg hover:bg-blue-600 transition text-sm">
                Verify
            </button>

            <div class="mt-auto text-center text-xs text-gray-500 pb-4">
                Didn't Receive the Code? <a href="#" class="text-primary font-bold hover:underline">Resend</a>
            </div>
        </form>

    </div>

    <!-- Simple script to auto-focus next input -->
    <script>
        const inputs = document.querySelectorAll('input[type="text"]');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
</body>

</html>
